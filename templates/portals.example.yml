  # Portal Scanner Configuration
# Used by /career-ops scan to discover new offers automatically.
#
# Strategy (3 levels):
#   1. Playwright → careers_url of each company (real-time, reliable)
#   2. Gree

Greenhouse API → structured JSON (fast, Greenhouse-only)
#   3. WebSearch with site: filters (broad discovery, may be stale)
#
# IMPORTANT: Each company in tracked_companies MUST have careers_url.
#
# HOW TO CUSTOMIZE:
#   1. Copy this file to portals.yml in the project root
#   2. Edit title_filter.positive with YOUR target role keywords
#   3. Add/remove companies in tracked_companies
#   4. Adjust search_queries for your preferred job boards
#   5. Set enabled: false on companies you don't care about

# -- Title filter --
# The scanner uses these keywords to decide if a title is relevant.
# At least 1 positive must match AND 0 negatives must match (case-insensitive).

title_filter:
  positive:
    # [CUSTOMIZE] Add keywords matching YOUR target roles
    # -- AI/ML roles --
    - "AI"
    - "ML"
    - "LLM"
    - "Agent"
    - "Agentic"
    - "GenAI"
    - "Generative AI"
    - "NLP"
    - "LLMOps"
    - "MLOps"
    - "Voice AI"
    - "Conversational AI"
    - "Speech"
    # -- Engineering roles --
    - "Platform Engineer"
    - "Solutions Architect"
    - "Solutions Engineer"
    - "Forward Deployed"
    - "Deployed Engineer"
    - "Customer Engineer"
    - "Integration Engineer"
    # -- Product roles --
    - "Product Manager"
    - "Technical PM"
    # -- Automation roles --
    - "Automation"
    - "Hyperautomation"
    - "Low-Code"
    - "No-Code"
    - "GTM Engineer"
    - "RevOps"
    - "Business Systems"
    - "Internal Tools"
    - "Transformation"
    # -- Software Engineering (general) --
    - "Software Engineer"
    - "Software Developer"
    - "Full Stack"
    - "Full-Stack"
    - "Backend Engineer"
    - "Frontend Engineer"
    - "Application Engineer"
    - "Systems Engineer"
    - "Infrastructure Engineer"
    - "DevOps"
    - "Site Reliability"
    - "SRE"
    # -- Fintech --
    - "Fintech"
    - "Financial Technology"
    - "Payments"
    - "Trading"
    - "Quant"
    - "Quantitative"
    # -- Cybersecurity --
    - "Security Engineer"
    - "Cybersecurity"
    - "Application Security"
    - "AppSec"
    - "Penetration"
    - "Red Team"
    # -- New Grad / Early Career --
    - "New Grad"
    - "New Graduate"
    - "University Grad"
    - "Entry Level"
    - "Early Career"
    - "Rotational"
    - "Development Program"
  negative:
    # [CUSTOMIZE] Add keywords for roles you want to exclude
    - "Intern"
    - ".NET"
    - "PHP"
    - "Ruby"
    - "Embedded"
    - "Firmware"
    - "FPGA"
    - "ASIC"
    - "Blockchain"
    - "Web3"
    - "Crypto"
    - "Salesforce Admin"
    - "SAP "
    - "Oracle EBS"
    - "Mainframe"
    - "COBOL"
    - "QA Engineer"
    - "Manual Test"
    - "Technical Writer"
    - "Technical Support"
    - "IT Support"
    - "Help Desk"
  seniority_boost:
    # These prefixes add relevance but are not required
    - "Senior"
    - "Staff"
    - "Principal"
    - "Lead"
    - "Head"
    - "Director"

# -- Search queries --
# Each query triggers a WebSearch. Use site: to filter by portal.
# The scanner extracts title, URL, and company from results.

search_queries:
  # -- Ashby --
  - name: Ashby — AI PM
    query: 'site:jobs.ashbyhq.com "AI Product Manager" OR "Senior Product Manager AI" remote'
    enabled: true

  - name: Ashby — Solutions Architect
    query: 'site:jobs.ashbyhq.com "Solutions Architect" AI OR automation remote'
    enabled: true

  - name: Ashby — AI Engineer
    query: 'site:jobs.ashbyhq.com "AI Engineer" OR "LLM Engineer" OR "Forward Deployed" remote'
    enabled: true

  - name: Ashby — Agentic
    query: 'site:jobs.ashbyhq.com "Agentic" OR "AI Agent" OR "Automation Architect" remote'
    enabled: true

  # -- Greenhouse --
  - name: Greenhouse — AI PM
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "AI Product Manager" OR "Senior Product Manager" AI remote'
    enabled: true

  - name: Greenhouse — SA & FDE
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "Solutions Architect" OR "Forward Deployed" AI remote'
    enabled: true

  - name: Greenhouse — AI Engineer
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "AI Engineer" OR "LLM" OR "Agentic" remote'
    enabled: true

  # -- Lever --
  - name: Lever — AI PM
    query: 'site:jobs.lever.co "AI Product Manager" OR "Solutions Architect" AI remote'
    enabled: true

  - name: Lever — AI Roles
    query: 'site:jobs.lever.co "AI Engineer" OR "Agentic" OR "LLMOps" OR "Automation" remote'
    enabled: true

  # -- Wellfound (startups) --
  - name: Wellfound — AI PM
    query: 'site:wellfound.com "AI Product Manager" OR "AI Solutions" remote'
    enabled: true

  # -- Workable --
  - name: Workable — AI Roles
    query: 'site:apply.workable.com "AI" "Product Manager" OR "Solutions Architect" OR "AI Engineer" remote'
    enabled: true

  # -- No-Code / Low-Code / Automation --
  - name: Ashby — No-Code & Automation
    query: 'site:jobs.ashbyhq.com "no-code" OR "low-code" OR "automation engineer" OR "n8n" OR "Make" OR "Airtable" remote senior'
    enabled: true

  - name: Greenhouse — No-Code & Automation
    query: 'site:job-boards.greenhouse.io "no-code" OR "low-code" OR "automation engineer" OR "business systems" senior remote'
    enabled: true

  - name: GTM Engineer — All portals
    query: '"GTM Engineer" OR "RevOps Engineer" OR "Growth Engineer" automation Airtable OR Make OR Clay remote'
    enabled: true

  # -- Voice AI & Conversational AI --
  - name: Voice AI — FDE & SA
    query: 'site:job-boards.greenhouse.io OR site:jobs.ashbyhq.com "Voice AI" OR "Conversational AI" OR "Speech" "Solutions" OR "Forward Deployed" OR "Customer Engineer"'
    enabled: true

  - name: Voice AI — AI Engineer
    query: 'site:job-boards.greenhouse.io OR site:jobs.ashbyhq.com "Voice" OR "Speech" "AI Engineer" OR "Deployment" OR "Integration"'
    enabled: true

  # -- Contact Center AI --
  - name: Contact Center AI — SA & SE
    query: '"contact center" OR "customer service" "AI" "Solutions Architect" OR "Solutions Engineer" OR "Forward Deployed" remote'
    enabled: true

  # -- FDE specific (cross-portal) --
  - name: FDE & Deployed Engineer — All portals
    query: '"Forward Deployed Engineer" OR "Deployed Engineer" OR "Deployment Engineer" AI site:job-boards.greenhouse.io OR site:jobs.ashbyhq.com OR site:jobs.lever.co'
    enabled: true

  # -- RemoteFront (aggregator) --
  - name: RemoteFront — AI & Automation
    query: 'site:remotefront.com "AI Engineer" OR "Solutions Engineer" OR "Automation" OR "LLM" OR "Agent" remote'
    enabled: true

  # -- New Grad / Early Career --
  - name: Greenhouse — New Grad SWE
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "New Grad" OR "New Graduate" OR "University Grad" "Software Engineer" OR "AI Engineer"'
    enabled: true

  - name: Ashby — New Grad SWE
    query: 'site:jobs.ashbyhq.com "New Grad" OR "New Graduate" OR "University Grad" "Software Engineer" OR "AI Engineer"'
    enabled: true

  - name: Lever — New Grad SWE
    query: 'site:jobs.lever.co "New Grad" OR "New Graduate" OR "University Grad" "Software Engineer" OR "AI Engineer"'
    enabled: true

  - name: LinkedIn — New Grad AI/SWE
    query: '"New Grad" OR "New Graduate" OR "Entry Level" "Software Engineer" OR "AI Engineer" Boston OR remote'
    enabled: true

  # -- Fintech --
  - name: Fintech — All portals
    query: '"Software Engineer" OR "AI Engineer" fintech OR payments OR "financial technology" OR trading OR quant remote OR Boston'
    enabled: true

  - name: Greenhouse — Fintech
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io fintech OR payments OR trading OR "financial services" "Software Engineer"'
    enabled: true

  - name: Ashby — Fintech
    query: 'site:jobs.ashbyhq.com fintech OR payments OR trading OR "financial services" "Software Engineer"'
    enabled: true

  # -- Full-Stack / Backend / Infrastructure --
  - name: Greenhouse — Full-Stack & Backend
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "Full Stack" OR "Full-Stack" OR "Backend Engineer" OR "Infrastructure Engineer" remote'
    enabled: true

  - name: Ashby — Full-Stack & Backend
    query: 'site:jobs.ashbyhq.com "Full Stack" OR "Full-Stack" OR "Backend Engineer" OR "Infrastructure Engineer" remote'
    enabled: true

  - name: Lever — Full-Stack & Backend
    query: 'site:jobs.lever.co "Full Stack" OR "Full-Stack" OR "Backend Engineer" OR "Infrastructure Engineer" remote'
    enabled: true

  # -- Kubernetes / Docker / DevOps --
  - name: DevOps & Platform — All portals
    query: '"Kubernetes" OR "Docker" OR "DevOps" OR "Platform Engineer" OR "Site Reliability" OR "SRE" "Software Engineer" remote OR Boston'
    enabled: true

  # -- Cybersecurity --
  - name: Cybersecurity — All portals
    query: '"Security Engineer" OR "Application Security" OR "AppSec" OR "Cybersecurity" remote OR Boston'
    enabled: true

  # -- Boston-area tech --
  - name: Boston — SWE & AI
    query: '"Software Engineer" OR "AI Engineer" OR "ML Engineer" Boston OR Cambridge OR "Greater Boston"'
    enabled: true

  # -- Wellfound (startups) --
